{{ define "schema" }}{{ end }}
{{ define "main" }}
<section class="block">
  <div class="container">
    <h2>{{ .Title | default "記事一覧" }}</h2>
    <div class="article-grid">
      {{ range .Pages.ByDate.Reverse }}
      <article class="article-card">
        <a href="{{ .Permalink }}">
          <div class="thumb">
            <img src="{{ printf "/img/thumbs/%s.png" .Params.slug | absURL }}" alt="{{ .Title }}" loading="lazy">
          </div>
          <div class="body">
            {{ with .Params.categories }}{{ range first 1 . }}<span class="cat">{{ . }}</span>{{ end }}{{ end }}
            <h3>{{ .Title }}</h3>
            {{ with .Params.total_reviews }}<div class="reviews">集合知: {{ . }}件</div>{{ end }}
          </div>
        </a>
      </article>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
